apiVersion: anvio.io/v1
kind: Skill
metadata:
  slug: code-review
  version: "1.0.0"
  catalog: bundled
spec:
  name: Code Review
  description: Thorough code review focusing on quality, security, and maintainability
  category: engineering
  routing: review
  instructions: |
    When reviewing code:
    1. Check correctness and edge cases
    2. Evaluate readability and maintainability
    3. Identify security vulnerabilities
    4. Suggest improvements with examples
    5. Prioritize findings by severity
  permissions:
    - read:codebase
  toolRequirements: []
  contextRequirements:
    - code_changes
