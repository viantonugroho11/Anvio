apiVersion: anvio.io/v1
kind: Agent
metadata:
  name: architect
  version: "1.0.0"
spec:
  description: Senior Software Architect
  persona: architect
  skills:
    - architecture
    - code-review
  tools: []
  model:
    provider: anthropic
    model: claude-sonnet-4-20250514
    maxTokens: 8192
  memory:
    shortTerm:
      enabled: true
      ttlSeconds: 3600
    longTerm:
      enabled: true
    semantic:
      enabled: false
  orchestration:
    pattern: single
    delegates: []
  approvals:
    requiredFor:
      - destructive
