# Custom workflow — architecture review for the Anvio monorepo.
# Run manually: anvio blueprint run architecture-review --dry-run
#              anvio blueprint run architecture-review scope=packages
apiVersion: anvio.io/v1
kind: Blueprint
metadata:
  slug: architecture-review
  version: "1.0.0"
  catalog: private
spec:
  description: Review architecture quality, package boundaries, and maintainability
  inputs:
    scope:
      type: string
      required: false
      default: monorepo
    userId:
      type: string
      default: local-user
    channel:
      type: string
      default: cli
  steps:
    - id: analyze
      type: parallel
      steps:
        - id: structure
          type: agent
          agent: architect
          input: |
            Review the {{inputs.scope}} architecture:
            - package boundaries and dependency direction
            - coupling between apps/ and packages/
            - alignment with local-first / file-first principles
            Keep the answer under 300 words.
        - id: maintainability
          type: agent
          agent: architect
          input: |
            Review {{inputs.scope}} for maintainability:
            - naming consistency and module cohesion
            - test coverage gaps in critical paths
            - documentation drift vs implementation
            Keep the answer under 300 words.

    - id: report
      type: transform
      template: |
        # Architecture Review — {{date}}
        **Scope:** {{inputs.scope}}
        **User:** {{inputs.userId}}

        ## Structure & Boundaries
        {{steps.structure.output}}

        ## Maintainability
        {{steps.maintainability.output}}

        ---
        _Generated by blueprint `architecture-review`_

    - id: deliver
      type: channel
      channel: "{{inputs.channel}}"
      message: "{{steps.report.output}}"

  outputs:
    summary:
      from: steps.report.output
