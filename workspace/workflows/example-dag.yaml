# Example DAG workflow — parallel gather + conditional report
apiVersion: anvio.io/v1
kind: Workflow
metadata:
  slug: example-dag
  version: "1.0.0"
  catalog: private
spec:
  description: Demonstrates dependsOn DAG with parallel branches and conditional output
  inputs:
    topic:
      type: string
      default: architecture
    includeSummary:
      type: string
      default: "true"
  nodes:
    - id: gather-a
      type: transform
      template: "Finding A for {{inputs.topic}}"
    - id: gather-b
      type: transform
      dependsOn: []
      template: "Finding B for {{inputs.topic}}"
    - id: merge
      type: transform
      dependsOn: [gather-a, gather-b]
      template: |
        # DAG Report — {{date}}
        - {{nodes.gather-a.output}}
        - {{nodes.gather-b.output}}
    - id: summary
      type: conditional
      dependsOn: [merge]
      condition: "{{inputs.includeSummary}}"
      then:
        - id: summary-line
          type: transform
          template: "Summary: {{nodes.merge.output}}"
      else:
        - id: skip-line
          type: transform
          template: "(summary skipped)"
  outputs:
    summary:
      from: nodes.merge.output
